<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Canvas — Remote Draw</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1e1e1e;
      overflow: hidden;
      overscroll-behavior: contain;
      -webkit-user-select: none;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Status bar ── */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 12px;
      background: #252525;
      flex-shrink: 0;
      font-size: 12px;
      color: #999;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
      transition: background .3s;
    }
    .status-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.connected { background: #22c55e; }
    .status-dot.error { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      background: #252525;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      height: 46px;
    }

    .spacer { flex: 1; min-width: 2px; }

    .btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border: none; border-radius: 50%;
      background: transparent; color: #aaa;
      cursor: pointer; padding: 0; flex-shrink: 0;
      transition: background .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active:not(:disabled) { background: rgba(255,255,255,0.15); color: #ddd; }
    .btn.active { background: rgba(189,193,198,0.25); color: #d4d8dc; }
    .btn:disabled { opacity: 0.3; cursor: default; }

    #color-picker {
      width: 26px; height: 26px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50%; padding: 0;
      cursor: pointer; background: none; flex-shrink: 0;
      -webkit-appearance: none; appearance: none;
    }
    #color-picker::-webkit-color-swatch-wrapper { padding: 1px; }
    #color-picker::-webkit-color-swatch { border: none; border-radius: 50%; }

    .radius-ctl {
      display: flex; align-items: center; gap: 3px;
      margin-left: 2px; flex-shrink: 0;
    }
    #radius-slider {
      width: 56px; height: 4px;
      -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.15);
      border-radius: 2px; outline: none;
    }
    #radius-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: #bdc1c6; cursor: pointer;
    }
    #radius-val {
      font-size: 11px; color: #888;
      min-width: 14px; text-align: center; flex-shrink: 0;
    }

    /* ── Canvas ── */
    #canvas-wrap {
      flex: 1; position: relative;
      overflow: hidden; background: #fff;
    }
    #drawing-canvas {
      position: absolute; top: 0; left: 0;
      touch-action: none;
    }
    #grid-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 1;
      display: none;
    }

    /* ── Floating send button ── */
    #send-btn {
      position: absolute;
      bottom: 14px;
      right: 14px;
      width: 52px; height: 52px;
      border: none; border-radius: 50%;
      background: #252525; color: #aaa;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: background .15s, color .15s, transform .1s;
      z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    #send-btn:active:not(:disabled) { background: #353535; color: #fff; transform: scale(0.95); }
    #send-btn:disabled { background: #1a1a1a; color: #555; cursor: default; transform: none; }
    #send-btn svg { flex-shrink: 0; }

    /* ── Status toast ── */
    #status-toast {
      position: absolute;
      bottom: 76px;
      right: 14px;
      font-size: 12px; color: #888;
      background: rgba(30,30,30,0.9);
      padding: 4px 10px; border-radius: 6px;
      pointer-events: none;
      opacity: 0; transition: opacity .2s;
      z-index: 10;
    }
    #status-toast.visible { opacity: 1; }
    #status-toast.error { color: #ef4444; }
    #status-toast.success { color: #22c55e; }

    /* ── Settings dialog ── */
    #settings-dialog {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 0;
      width: min(280px, calc(100% - 32px));
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font-family: inherit;
      font-size: 13px;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
    }
    #settings-dialog::backdrop { background: rgba(0,0,0,0.5); }
    .dialog-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .dialog-header h3 { font-size: 15px; font-weight: 600; color: #fff; }
    .dialog-close {
      width: 24px; height: 24px; border: none; border-radius: 50%;
      background: transparent; color: #888; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; line-height: 1;
    }
    .dialog-close:hover { background: rgba(255,255,255,0.1); color: #ddd; }
    .dialog-body { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .setting-row { display: flex; align-items: center; justify-content: space-between; }
    .setting-label { font-size: 13px; color: #ccc; }
    .bg-toggle {
      display: flex; border-radius: 8px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .bg-toggle button {
      padding: 6px 14px; border: none;
      background: transparent; color: #888;
      cursor: pointer; font-size: 12px; font-family: inherit;
      transition: background .15s, color .15s;
    }
    .bg-toggle button + button { border-left: 1px solid rgba(255,255,255,0.12); }
    .bg-toggle button.selected { background: rgba(189,193,198,0.25); color: #d4d8dc; }
    .bg-toggle button:hover:not(.selected) { background: rgba(255,255,255,0.06); color: #bbb; }
    .grid-switch {
      position: relative; width: 40px; height: 22px;
      border-radius: 11px; border: none;
      background: rgba(255,255,255,0.12);
      cursor: pointer; padding: 0;
      transition: background .2s;
    }
    .grid-switch.on { background: #bdc1c6; }
    .grid-switch::after {
      content: '';
      position: absolute; top: 2px; left: 2px;
      width: 18px; height: 18px;
      border-radius: 50%; background: #fff;
      transition: transform .2s;
    }
    .grid-switch.on::after { transform: translateX(18px); }
    .grid-size-ctl {
      display: flex; align-items: center; gap: 6px;
    }
    .grid-size-ctl input[type="range"] {
      width: 80px; height: 4px;
      -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.15);
      border-radius: 2px; outline: none;
    }
    .grid-size-ctl input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: #bdc1c6; cursor: pointer;
    }
    .grid-size-ctl span {
      font-size: 11px; color: #888;
      min-width: 18px; text-align: center;
    }

    /* ── Error overlay ── */
    #error-overlay {
      position: fixed;
      inset: 0;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 32px;
      text-align: center;
      z-index: 100;
    }
    #error-overlay.hidden { display: none; }
    #error-overlay h2 { font-size: 18px; color: #fff; }
    #error-overlay p { font-size: 14px; color: #999; line-height: 1.5; }
  </style>
</head>
<body>
  <div id="app">
    <div id="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Connecting...</span>
    </div>

    <div id="toolbar">
      <button id="tool-draw" class="btn active" title="Draw">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
      </button>
      <button id="tool-erase" class="btn" title="Eraser">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.6 1.6c.8-.8 2-.8 2.8 0l5 5c.8.8.8 2 0 2.8L12 20"/>
          <path d="M6 20h14"/>
        </svg>
      </button>
      <input type="color" id="color-picker" value="#000000" title="Color">
      <div class="radius-ctl">
        <input type="range" id="radius-slider" min="1" max="40" value="3" title="Brush size">
        <span id="radius-val">3</span>
      </div>

      <div class="spacer"></div>

      <button id="tool-undo" class="btn" title="Undo" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 7h7a3 3 0 010 6H8"/><path d="M6 4L3 7l3 3"/>
        </svg>
      </button>
      <button id="tool-redo" class="btn" title="Redo" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M13 7H6a3 3 0 000 6h2"/><path d="M10 4l3 3-3 3"/>
        </svg>
      </button>
      <button id="tool-clear" class="btn" title="Clear">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
      </button>
      <button id="tool-settings" class="btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M2 4h12M2 8h12M2 12h12"/>
        </svg>
      </button>
    </div>

    <dialog id="settings-dialog">
      <div class="dialog-header">
        <h3>Settings</h3>
        <button class="dialog-close" id="settings-close">&times;</button>
      </div>
      <div class="dialog-body">
        <div class="setting-row">
          <span class="setting-label">Background</span>
          <div class="bg-toggle">
            <button id="bg-white" type="button" class="selected">White</button>
            <button id="bg-black" type="button">Black</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Grid</span>
          <button id="grid-toggle" type="button" class="grid-switch"></button>
        </div>
        <div class="setting-row">
          <span class="setting-label">Grid size</span>
          <div class="grid-size-ctl">
            <input type="range" id="grid-size-slider" min="10" max="60" value="50">
            <span id="grid-size-val">50</span>
          </div>
        </div>
      </div>
    </dialog>

    <div id="canvas-wrap">
      <canvas id="drawing-canvas"></canvas>
      <div id="grid-overlay"></div>

      <button id="send-btn" title="Paste to Chat" disabled>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>

      <div id="status-toast"></div>
    </div>
  </div>

  <div id="error-overlay" class="hidden">
    <h2 id="error-title">Connection Error</h2>
    <p id="error-msg">Could not connect. Please scan the QR code again from the extension.</p>
  </div>

  <script src="remote.js"></script>
</body>
</html>
