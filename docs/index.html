<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Canvas — Remote Draw</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #e0e0e0;
      background: #1e1e1e;
      overflow: hidden;
      overscroll-behavior: contain;
      -webkit-user-select: none;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh;
    }

    /* ── Status bar ── */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      background: #252525;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      font-size: 13px;
      color: #999;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
      transition: background .3s;
    }
    .status-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.connected { background: #22c55e; }
    .status-dot.error { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: #252525;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .btn {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      border: none; border-radius: 10px;
      background: transparent; color: #aaa;
      cursor: pointer; padding: 0; flex-shrink: 0;
      transition: background .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active:not(:disabled) { background: rgba(255,255,255,0.15); }
    .btn.active { background: rgba(189,193,198,0.25); color: #d4d8dc; }
    .btn:disabled { opacity: 0.3; cursor: default; }

    #color-picker {
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50%; padding: 0;
      cursor: pointer; background: none; flex-shrink: 0;
      -webkit-appearance: none; appearance: none;
    }
    #color-picker::-webkit-color-swatch-wrapper { padding: 2px; }
    #color-picker::-webkit-color-swatch { border: none; border-radius: 50%; }

    .spacer { flex: 1; min-width: 4px; }

    .radius-ctl {
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    }
    #radius-slider {
      width: 70px; height: 6px;
      -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.15);
      border-radius: 3px; outline: none;
    }
    #radius-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 20px; height: 20px; border-radius: 50%;
      background: #bdc1c6; cursor: pointer;
    }
    #radius-val {
      font-size: 12px; color: #888;
      min-width: 16px; text-align: center; flex-shrink: 0;
    }

    /* ── Canvas ── */
    #canvas-wrap {
      flex: 1; position: relative;
      overflow: hidden; background: #fff;
    }
    #drawing-canvas {
      position: absolute; top: 0; left: 0;
      touch-action: none;
    }

    /* ── Bottom bar ── */
    #bottom-bar {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
      background: #252525;
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    #clear-btn {
      width: 52px; height: 52px;
      border: none; border-radius: 14px;
      background: rgba(255,255,255,0.08);
      color: #aaa;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    #clear-btn:active { background: rgba(255,255,255,0.15); }

    #send-btn {
      flex: 1;
      height: 52px;
      border: none; border-radius: 14px;
      background: #bdc1c6;
      color: #1e1e1e;
      font-size: 16px; font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, opacity .15s;
    }
    #send-btn:active:not(:disabled) { background: #a8adb2; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Error overlay ── */
    #error-overlay {
      position: fixed;
      inset: 0;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 32px;
      text-align: center;
      z-index: 100;
    }
    #error-overlay.hidden { display: none; }
    #error-overlay h2 { font-size: 18px; color: #fff; }
    #error-overlay p { font-size: 14px; color: #999; line-height: 1.5; }
  </style>
</head>
<body>
  <div id="app">
    <div id="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Connecting...</span>
    </div>

    <div id="toolbar">
      <button id="tool-draw" class="btn active" title="Draw">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
      </button>
      <button id="tool-erase" class="btn" title="Eraser">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.6 1.6c.8-.8 2-.8 2.8 0l5 5c.8.8.8 2 0 2.8L12 20"/>
          <path d="M6 20h14"/>
        </svg>
      </button>
      <input type="color" id="color-picker" value="#000000" title="Color">
      <div class="spacer"></div>
      <div class="radius-ctl">
        <input type="range" id="radius-slider" min="1" max="40" value="3" title="Brush size">
        <span id="radius-val">3</span>
      </div>
      <button id="tool-undo" class="btn" title="Undo" disabled>
        <svg width="22" height="22" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 7h7a3 3 0 010 6H8"/><path d="M6 4L3 7l3 3"/>
        </svg>
      </button>
      <button id="tool-redo" class="btn" title="Redo" disabled>
        <svg width="22" height="22" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M13 7H6a3 3 0 000 6h2"/><path d="M10 4l3 3-3 3"/>
        </svg>
      </button>
    </div>

    <div id="canvas-wrap">
      <canvas id="drawing-canvas"></canvas>
    </div>

    <div id="bottom-bar">
      <button id="clear-btn" title="Clear">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
      </button>
      <button id="send-btn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
        Send to Mac
      </button>
    </div>
  </div>

  <div id="error-overlay" class="hidden">
    <h2 id="error-title">Connection Error</h2>
    <p id="error-msg">Could not connect. Please scan the QR code again from the extension.</p>
  </div>

  <script src="remote.js"></script>
</body>
</html>
